name: .NET Core Local Deploy on ECS

on:
  push:
    branches: [ "master" ]

jobs:
  deploy:
    # 关键点：指定在您自己的 ECS Runner 上运行
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Build and Publish
        run: |
          dotnet restore src/backend/Atlas.WebApi/Atlas.WebApi.csproj
          # 直接发布到服务器的本地部署目录
          dotnet publish src/backend/Atlas.WebApi/Atlas.WebApi.csproj -c Release -o /home/www/security-platform

      - name: Restart Application Service
        run: |
          # 因为 Runner 就在本地，直接执行重启命令即可
          sudo systemctl restart security-platform.service
